name: Bug report
description: Report a reproducible Rigyn failure or regression
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, OAuth tokens, private source, or other credentials. Use the private security-reporting path in SECURITY.md for vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest repeatable command sequence or project shape. Replace private values with safe placeholders.
      placeholder: |
        1. Run ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Rigyn version
      description: Paste the output of rigyn --version.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system and architecture
      description: For example, Ubuntu 24.04 x64, macOS arm64, Windows 11 x64, WSL, or Termux.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Paste the output of node --version.
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Self-contained installation from npm
        - Self-contained installation from a source checkout
        - Development checkout with npm run dev
        - Other
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Include relevant errors, provider and model identifiers, extension diagnostics, or terminal details after removing secrets and private data.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Note whether the issue reproduces without extensions, in a new session, or outside tmux when applicable.
