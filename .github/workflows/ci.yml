name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 60 || 30 }}
    env:
      RIGYN_REQUIRE_PROCESS_TESTS: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24]
        include:
          - os: ubuntu-latest
            node: 26
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Configure native compiler on Windows
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
        with:
          arch: x64
      - name: Build native helper
        if: runner.os == 'macOS' || runner.os == 'Windows'
        run: npm run native:build --workspace @rigyn/terminal
      - run: npm run check

  node-22-source:
    name: Node 22 source check (${{ matrix.workspace }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        workspace: ["@rigyn/terminal", "@rigyn/models", "@rigyn/kernel"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build models dependency for kernel
        if: matrix.workspace == '@rigyn/kernel'
        run: npm run build:offline --workspace @rigyn/models
      - run: npm run check --workspace ${{ matrix.workspace }}

  regression-guards:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:coverage:risk
      - run: npm run benchmark:runtime
